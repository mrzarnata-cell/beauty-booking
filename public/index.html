<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haoua Beauty Center - Book Appointment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <img src="logo.jpeg" alt="Haoua Beauty Center" class="logo">
    <h1>Haoua Beauty Center</h1>
    <p>Book your beauty session online</p>
  </div>

  <div class="container">
    <div id="success-msg" class="success-msg">Booking confirmed! We'll contact you soon.</div>
    <div id="error-msg" class="error-msg">Something went wrong. Please try again.</div>

    <div class="card">
      <h2>Book an Appointment</h2>
      <form id="booking-form">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" required placeholder="+212 6XX-XXXXXX">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email (optional)</label>
          <input type="email" id="email" placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="service">Service *</label>
          <select id="service" required></select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label>Time *</label>
            <div id="time-slots" class="time-slots">
              <p style="color:#999;font-size:0.9rem;">Select a date first</p>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="description">Describe what you want (optional)</label>
          <textarea id="description" placeholder="Tell us about your desired style, preferences, or any special requests..."></textarea>
        </div>

        <button type="submit" class="btn">Book Appointment</button>
      </form>
    </div>
  </div>

  <div class="footer">
    &copy; 2026 Haoua Beauty Center
  </div>

  <a href="/admin.html" class="admin-link">Admin</a>

  <script src="script.js"></script>
</body>
</html>
